name: Build QEMU

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: macOS aarch64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and package
        run: ./scripts/build-qemu.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qemu-macOS-ARM64
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-24.04
            artifact: qemu-linux-x86_64
          - name: Linux aarch64
            runner: ubuntu-24.04-arm
            artifact: qemu-linux-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build virtiofsd package in Alpine
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine:edge \
            /bin/sh -lc 'apk add --no-cache bash && bash ./scripts/build-virtiofsd.sh'

      - name: Build QEMU package in Alpine
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            alpine:edge \
            /bin/sh -lc 'apk add --no-cache bash && bash ./scripts/build-qemu.sh'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: Release
    needs: [ build-macos, build-linux ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release notes
        run: |
          cat > RELEASE-NOTES.md <<'EOF'
          Portable headless QEMU 11.0.0 builds for libvirt-managed Linux guests.

          Included targets:
          - macOS aarch64
          - Linux x86_64
          - Linux aarch64

          Main binaries:
          - qemu-system-aarch64 on aarch64 hosts
          - qemu-system-x86_64 on x86_64 hosts
          - qemu-img
          - qemu-io
          - qemu-nbd
          - qemu-storage-daemon
          - qemu-ga on Linux builds
          - qemu-pr-helper on Linux builds
          - matching-architecture EDK2 UEFI firmware

          Separate Linux-only binaries:
          - virtiofsd

          Linux x86_64 packages are named qemu-x86_64-headless-linux and
          include x86 microvm machine support.

          Notes:
          - No upstream QEMU C source patches are applied.
          - QEMU Linux builds are produced inside Alpine/musl containers.
          - QEMU Linux binaries are stripped with strip --strip-unneeded.
          - virtiofsd Linux packages are built separately inside Alpine.
          - macOS links Homebrew GLib statically when available, and bundles any
            remaining non-system dylibs with @loader_path install names.
          - UEFI firmware is copied from QEMU pc-bios prebuilt EDK2 blobs; copy
            the *-vars.fd template per VM before using it as a writable varstore.
          - qemu-ga is included only in Linux packages for same-architecture
            Linux guests.
          - virtiofsd is published as a separate Linux-only package.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" \
            --title "QEMU ${GITHUB_REF_NAME}" \
            --notes-file RELEASE-NOTES.md
